data:
  ds_name: single_block_v2
  split_name: single_block_v2
  batch_size: 8

eval:
  output_dir: metrics
  threshold: 0.1

train:
  device: cuda
  lr: 3e-4
  wd: 0.0
  max_epochs: 50
  min_loss: 1e-6
  eval_interval: 1
  components:
  # - gx
  # - gy
  - gz
  confidence: 0.95

  noise:
    accuracy: 5
    name: noise_exp_5

  loss_functions:
    - mse
    - mae
    - huber
    - smooth_l1
