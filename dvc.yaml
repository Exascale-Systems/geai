stages:
  gen_data:
    cmd: python3 src/gen/batch.py
    outs:
      - data/single_block_v2.h5:
          cache: false

  train:
    foreach: ${train.noise_levels}
    do:
      cmd: python3 src/train.py ${item.name}
      deps:
        - data/single_block_v2.h5
        - src/train.py
        - src/training/engine.py
        - src/data/dataset.py
      params:
        - train.max_epochs
        - train.device
        - train.lr
        - train.confidence
        - train.noise_levels
      outs:
        - checkpoints/${item.name}_final.pt:
            cache: false
        - checkpoints/${item.name}_best.pt:
            cache: false

  eval:
    foreach: ${train.noise_levels}
    do:
      cmd: python3 src/eval.py ${item.name}
      deps:
        - checkpoints/${item.name}_final.pt
        - src/eval.py
        - src/training/evaluation.py
      params:
        - train.components
        - train.confidence
        - train.noise_levels
        - eval.headless
        - eval.output_dir
      metrics:
        - metrics/eval_${item.accuracy}.json:
            cache: false
