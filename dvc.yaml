stages:
  train:
    cmd: python src/train.py
    params:
      - params.yaml:
          - train.lr
          - train.wd
          - train.max_epochs
          - train.min_loss
          - train.eval_interval
          - train.device
          - train.batch_size
    outs:
      - checkpoints/best.pt:
          cache: true
      - checkpoints/final.pt:
          cache: true
    metrics:
      - metrics.json:
          cache: false
