stages:
  gen_data:
    cmd: python3 src/gen/batch.py
    outs:
      - data/single_block_v2.h5:
          cache: false

  train_0_5:
    cmd: python3 src/train.py noise_exp_0.5 --accuracy 0.5 --confidence 0.95
    deps:
      - data/single_block_v2.h5
      - src/train.py
      - src/training/engine.py
      - src/data/dataset.py
    params:
      - train.max_epochs
      - train.device
      - train.lr
    outs:
      - checkpoints/noise_exp_0.5_final.pt:
          cache: false
      - checkpoints/noise_exp_0.5_best.pt:
          cache: false

  train_5:
    cmd: python3 src/train.py noise_exp_5 --accuracy 5 --confidence 0.95
    deps:
      - data/single_block_v2.h5
      - src/train.py
      - src/training/engine.py
      - src/data/dataset.py
    params:
      - train.max_epochs
      - train.device
      - train.lr
    outs:
      - checkpoints/noise_exp_5_final.pt:
          cache: false
      - checkpoints/noise_exp_5_best.pt:
          cache: false

  train_50:
    cmd: python3 src/train.py noise_exp_50 --accuracy 50 --confidence 0.95
    deps:
      - data/single_block_v2.h5
      - src/train.py
      - src/training/engine.py
      - src/data/dataset.py
    params:
      - train.max_epochs
      - train.device
      - train.lr
    outs:
      - checkpoints/noise_exp_50_final.pt:
          cache: false
      - checkpoints/noise_exp_50_best.pt:
          cache: false

  train_500:
    cmd: python3 src/train.py noise_exp_500 --accuracy 500 --confidence 0.95
    deps:
      - data/single_block_v2.h5
      - src/train.py
      - src/training/engine.py
      - src/data/dataset.py
    params:
      - train.max_epochs
      - train.device
      - train.lr
    outs:
      - checkpoints/noise_exp_500_final.pt:
          cache: false
      - checkpoints/noise_exp_500_best.pt:
          cache: false

  eval_0_5:
    cmd: python3 src/eval.py noise_exp_0.5 --headless -o metrics/eval_0.5.json
    deps:
      - checkpoints/noise_exp_0.5_final.pt
      - src/eval.py
      - src/training/evaluation.py
    params:
      - train.components
    metrics:
      - metrics/eval_0.5.json:
          cache: false

  eval_5:
    cmd: python3 src/eval.py noise_exp_5 --headless -o metrics/eval_5.json
    deps:
      - checkpoints/noise_exp_5_final.pt
      - src/eval.py
      - src/training/evaluation.py
    params:
      - train.components
    metrics:
      - metrics/eval_5.json:
          cache: false

  eval_50:
    cmd: python3 src/eval.py noise_exp_50 --headless -o metrics/eval_50.json
    deps:
      - checkpoints/noise_exp_50_final.pt
      - src/eval.py
      - src/training/evaluation.py
    params:
      - train.components
    metrics:
      - metrics/eval_50.json:
          cache: false

  eval_500:
    cmd: python3 src/eval.py noise_exp_500 --headless -o metrics/eval_500.json
    deps:
      - checkpoints/noise_exp_500_final.pt
      - src/eval.py
      - src/training/evaluation.py
    params:
      - train.components
    metrics:
      - metrics/eval_500.json:
          cache: false
